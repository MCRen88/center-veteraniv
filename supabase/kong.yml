_format_version: "2.1"
services:
  - name: auth-v1
    url: http://auth:9999
    routes:
      - name: auth-v1
        paths:
          - /auth/v1
        strip_path: true
  - name: rest-v1
    url: http://rest:3000
    routes:
      - name: rest-v1
        paths:
          - /rest/v1
        strip_path: true
plugins:
  - name: cors
    config:
      origins:
        - '*'
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - Authorization
        - apiKey
        - Prefer
        - x-client-info
        - x-supabase-api-version
        - x-retry-count
        - accept-profile
        - content-profile
        - Range
        - If-Match
        - If-None-Match
      exposed_headers:
        - Content-Length
        - Content-Range
      credentials: true
      max_age: 86400
